# ============================================================================
# Performance & Behavior
# ============================================================================

# Faster escape time for better vim/tmux integration (default is 500ms)
set -sg escape-time 10

# Increase history limit (default is 2000)
set -g history-limit 50000

# Enable focus events for better terminal integration
set -g focus-events on

# Aggressive resize for better performance
setw -g aggressive-resize on

# ============================================================================
# Terminal Configuration
# ============================================================================

set -g default-terminal "tmux-256color"
set -g terminal-overrides "*:kf1=\e[11~:kf2=\e[12~:kf3=\e[13~:kf4=\e[14~:kf5=\e[15~:kf6=\e[17~:kf7=\e[18~:kf8=\e[19~:XT"

# ============================================================================
# Window & Pane Configuration
# ============================================================================

# Start windows and panes at 1, not 0 (more intuitive)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Automatically rename windows based on the program running
setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string "#T"

# ============================================================================
# Key Bindings - Prefix
# ============================================================================

# Change prefix from Ctrl-b to Ctrl-a (easier to reach, but keep Ctrl-b as backup)
# Uncomment the next line if you want to use Ctrl-a instead:
# set -g prefix C-a
# bind C-a send-prefix
# unbind C-b

# ============================================================================
# Key Bindings - Pane Navigation (Vim-style)
# ============================================================================

# Use vim keybindings for pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use vim keybindings for splitting panes
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================================================
# Key Bindings - Pane Resizing
# ============================================================================

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================================
# Key Bindings - Window Management
# ============================================================================

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Easier window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ============================================================================
# Key Bindings - Copy Mode (Vim-style)
# ============================================================================

# Enter copy mode with vim keybindings
setw -g mode-keys vi

# Vim-style selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Use vim keys to move in copy mode
bind-key -T copy-mode-vi h send-keys -X cursor-left
bind-key -T copy-mode-vi j send-keys -X cursor-down
bind-key -T copy-mode-vi k send-keys -X cursor-up
bind-key -T copy-mode-vi l send-keys -X cursor-right

# ============================================================================
# Mouse Configuration
# ============================================================================

set -g mouse on

# ============================================================================
# Status Bar Configuration
# ============================================================================

# Status bar position at the top
set-option -g status-position top

# Update status bar every 5 seconds
set -g status-interval 5

# ============================================================================
# Plugins
# ============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'dracula/tmux'

# ============================================================================
# Dracula Theme Configuration
# ============================================================================

set -g @dracula-plugins "cpu-usage ram-usage"
set -g @dracula-show-fahrenheit false
set -g @dracula-transparent-powerline-bg true
set -g @dracula-show-flags true
set -g @dracula-show-powerline true
set -g @dracula-show-edge-icons true

# for left
set -g @dracula-show-left-sep "\uE0B4"

# for right symbol (can set any symbol you like as separator)
set -g @dracula-show-right-sep "\uE0B6"

set -g @dracula-show-left-icon "\uE007"
set -g @dracula-left-icon-padding 0

# ============================================================================
# Initialize TMUX plugin manager (keep this line at the very bottom)
# ============================================================================

run -b '~/.tmux/plugins/tpm/tpm'
